name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint + test (py3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package + test/dev deps
        run: |
          python -m pip install --upgrade pip
          # `.[dev]` pulls in the `.[test]` extra (the pure-wheel practical test
          # stack: numpy/pandas/scipy/scikit-learn/scikit-image/joblib/xarray/h3/
          # pyarrow/zarr/fastapi/uvicorn/httpx/typer/pillow) plus ruff + mypy.
          # No native-GDAL / torch / earthengine here — those would break the
          # runner and are exercised only behind optional extras + importorskip.
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src tests

      - name: Ruff format check
        run: ruff format --check src tests

      - name: Pytest
        run: pytest -q

      - name: Mypy (non-blocking)
        continue-on-error: true
        run: mypy

      - name: Compile Earth Engine scripts
        run: python -m py_compile gee/*.py

      - name: Validate notebook JSON
        run: |
          python - <<'PY'
          import json, glob, sys
          bad = []
          for nb in glob.glob("notebooks/*.ipynb"):
              try:
                  json.load(open(nb))
              except Exception as exc:  # noqa: BLE001
                  bad.append(f"{nb}: {exc}")
          if bad:
              print("Invalid notebook JSON:\n" + "\n".join(bad))
              sys.exit(1)
          print("All notebooks are valid JSON.")
          PY
