# AgriStress — conda environment (conda-forge geospatial stack).
# The native GDAL/PROJ/GEOS toolchain is pinned through conda-forge so that
# rasterio / geopandas / pyproj / gdal all share a consistent C library ABI.
#
#   conda env create -f environment.yml
#   conda activate agristress
#   pip install -e ".[all]"     # editable install of the agristress package
#
name: agristress
channels:
  - conda-forge
dependencies:
  - python=3.11

  # --- native geospatial toolchain (conda-forge) ---
  - gdal>=3.8
  - libgdal>=3.8
  - proj>=9.3
  - geos>=3.12
  - rasterio>=1.3
  - rioxarray>=0.15
  - geopandas>=0.14
  - shapely>=2.0
  - pyproj>=3.6
  - fiona>=1.9

  # --- datacube / array ---
  - xarray>=2024.2
  - dask>=2024.2
  - zarr>=2.17
  - numpy>=1.26
  - pandas>=2.1
  - bottleneck
  - netcdf4
  - h5netcdf

  # --- earth engine + STAC ---
  - earthengine-api>=0.1.390
  - geemap>=0.32
  - pystac-client>=0.7
  - stackstac>=0.5
  - odc-stac>=0.3

  # --- ml / dl (CPU build; swap to pytorch-cuda on GPU hosts) ---
  - scikit-learn>=1.4
  - xgboost>=2.0
  - lightgbm>=4.3
  - pytorch>=2.2

  # --- serving / viz / config ---
  - fastapi>=0.110
  - uvicorn>=0.29
  - redis-py>=5.0
  - pydantic>=2.6
  - pydantic-settings>=2.2
  - typer>=0.12
  - rich>=13.7
  - python-dotenv>=1.0
  - pyyaml>=6.0
  - folium>=0.16
  - plotly>=5.20
  - matplotlib>=3.8

  # --- dev tooling ---
  - pytest>=8.1
  - pytest-cov>=5.0
  - ruff>=0.4
  - black>=24.3
  - mypy>=1.9
  - pre-commit>=3.7

  # --- pip-only packages (not on conda-forge or newer there) ---
  - pip
  - pip:
      - h3>=4.0
      - timm>=0.9
      - rio-tiler>=6.4
      - titiler.core>=0.18
      - -e .
